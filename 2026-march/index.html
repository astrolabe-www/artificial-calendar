<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/2.0.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/satellite.js@6.0.2/dist/satellite.min.js"></script>

    <script src="../js/draw.js"></script>
    <script src="../js/math.js"></script>
    <script src="../js/path.js"></script>
    <script src="../js/tle.js"></script>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      canvas {
        display: block;
      }
    </style>
  </head>

  <script>
    const NYC = {
      lat: 40.731266,
      lon: -73.997060,
      tz: -4,
    };

    const FOR = {
      lat: -3.731862,
      lon: -38.526669,
      tz: -3,
    };

    const LOCATION = NYC;
    const MONTH = 3;
    const NDAYS = 13;

    const SUN_OPT = {
      numDays: NDAYS,
      dayStep: 7,
      secondStep: 2*60,
    };

    const MOON_OPT = {
      numDays: NDAYS,
      dayStep: 1,
      secondStep: 2*60,
    };

    const SAT_OPT = {
      numDays: NDAYS,
      dayStep: 1,
      secondStep: 4*10,
    };

    const STA_OPT = {
      numDays: NDAYS,
      dayStep: 1,
      secondStep: 6*60*60,
    };

    const TLES = {};
    const SSS = ["ISS (NAUKA)", "CREW DRAGON 12", "SOYUZ-MS 28", "CSS (TIANHE)"];
    // const SCI = ["FGRST (GLAST)", "HST", "TERRA", "CXO", "POLAR"];
    const SCI = ["FGRST (GLAST)", "HST"];

    const labels = [];
    const names = [];

    async function setup() {
      createCanvas(windowWidth, windowHeight);
      angleMode(DEGREES);
      Object.assign(TLES, await fetchTles());
    }

    function draw() {
      push();
      translate(width/2, height/2);
      const maxR = min(width/2, height/2);
      const dotDim = 2;

      if (frameCount == 1) {
        background(255);
        drawElevationRings(maxR);
      }

      if (frameCount == 20) {
        console.log("SUN");
        const visibleSun = getVisiblePaths(2026, MONTH, LOCATION, ultimate.solarAzimuthElevation, SUN_OPT);
        visibleSun.forEach(p => {
          drawPath(p, 8, color(220, 120, 0, 100), maxR);
        });

        console.log("MOON");
        const visibleMoon = getVisiblePaths(2026, MONTH, LOCATION, gpt.lunarAzimuthElevation, MOON_OPT);
        for (let idx = 0; idx < visibleMoon.length; idx += 4) {
          drawPath(visibleMoon[idx], 4, color(0,0,0, 100), maxR);
        }
      }

      if (frameCount == 3) {
        const goesColor = color(220, 20, 20);
        TLES.goes.forEach(s => {
          STA_OPT["tle"] = s.tle;
          const visibleGoes = getStationaryPath(2026, MONTH, LOCATION, satjs.satelliteAzimuthElevation, STA_OPT);

          if (Object.keys(visibleGoes).length < 1) return;

          drawPath(visibleGoes, dotDim, goesColor, maxR);
          names.push({
            name: s.name,
            loc: visibleGoes.path[0],
            date: visibleGoes.start,
            color: color(220, 20, 20),
          });
        });
      }

      if (frameCount == 40) {
        const noaaColor = color(18, 18, 220);
        const noaaMostVisited = getMostVisitedHighestLowestPaths(2026, MONTH, LOCATION, TLES.noaa, SAT_OPT);
        drawPath(noaaMostVisited.highestPath, dotDim, noaaColor, maxR);
        labels.push({
          name: noaaMostVisited.name,
          loc: noaaMostVisited.highestPath.path[0],
          date: noaaMostVisited.highestPath.start,
          color: noaaColor,
        });
      }

      if (frameCount == 50) {
        const starlinkColor = color(200, 18, 22);
        const starlinkMostVisited = getMostVisitedHighestLowestPaths(2026, MONTH, LOCATION, TLES.starlink.slice(0, 32), SAT_OPT);
        drawPath(starlinkMostVisited.highestPath, dotDim, starlinkColor, maxR);
        labels.push({
          name: starlinkMostVisited.name,
          loc: starlinkMostVisited.highestPath.path[0],
          date: starlinkMostVisited.highestPath.start,
          color: starlinkColor,
        });
      }

      if (frameCount == 60) {
        const kuiperColor = color(20, 180, 22);
        const kuiperMostVisited = getMostVisitedHighestLowestPaths(2026, MONTH, LOCATION, TLES.kuiper.slice(0, 32), SAT_OPT);
        drawPath(kuiperMostVisited.highestPath, dotDim, kuiperColor, maxR);
        labels.push({
          name: kuiperMostVisited.name,
          loc: kuiperMostVisited.highestPath.path[0],
          date: kuiperMostVisited.highestPath.start,
          color: kuiperColor,
        });
      }

      if (frameCount == 7) {
        const sssColor = color(220, 10, 220);
        const sssTles = TLES.sss.filter(s => SSS.includes(s.name));
        const sssMostVisited = getMostVisitedHighestLowestPaths(2026, MONTH, LOCATION, sssTles, SAT_OPT);
        drawPath(sssMostVisited.highestPath, dotDim, sssColor, maxR);
        labels.push({
          name: sssMostVisited.name,
          loc: sssMostVisited.highestPath.path[0],
          date: sssMostVisited.highestPath.start,
          color: sssColor,
        });
      }

      if (frameCount == 8) {
        const sciColor = color(180, 180, 220);
        SCI.forEach(name => {
          const s = TLES.sci.filter(s => s.name == name)[0];
          SAT_OPT["tle"] = s.tle;
          const visible = getVisiblePaths(2026, MONTH, LOCATION, satjs.satelliteAzimuthElevation, SAT_OPT);
          const [highest, lowest] = getHighestLowestPaths(visible);
          drawPath(highest, dotDim, sciColor, maxR);
          labels.push({
            name: s.name,
            loc: highest.path[0],
            date: highest.start,
            color: sciColor,
          });
        });

        drawLabels(labels, maxR);
        drawNames(names, maxR);
        noLoop();
      }

      pop();
    }
  </script>

  <body>
    <main></main>
  </body>
</html>
