<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/2.0.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/satellite.js@6.0.2/dist/satellite.min.js"></script>
    <script src="../js/math.js"></script>
    <script src="../js/path.js"></script>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      canvas {
        display: block;
      }
    </style>
  </head>

  <script>
    const NYC = {
      lat: 40.731266,
      lon: -73.997060,
      tz: -4,
    };

    const FOR = {
      lat: -3.731862,
      lon: -38.526669,
      tz: -3,
    };

    const LOCATION = NYC;

    const tles = {};

    const SUN_OPT = {
      numDays: 11,
      dayStep: 7,
      secondStep: 60,
    };

    const MOON_OPT = {
      numDays: 11,
      dayStep: 1,
      secondStep: 60,
    };

    const SAT_OPT = {
      numDays: 11,
      dayStep: 1,
      secondStep: 4,
    };

    const STA_OPT = {
      numDays: 11,
      dayStep: 1,
      secondStep: 6*60*60,
    };

    async function setup() {
      createCanvas(windowWidth, windowHeight);
      angleMode(DEGREES);
      noLoop();
      noStroke();
      const tleRes = await fetch("../data/tles.json");
      const tleJson = await tleRes.json();
      Object.assign(tles, tleJson.toSorted((a, b) => b.date.localeCompare(a.date))[0]);
    }

    function drawElevationRings(rad) {
      push();
      stroke(0, 255);
      ellipse(0, 0, 2 * rad, 2 * rad);

      stroke(0, 64);
      for (let deg = 15; deg < 90; deg += 15) {
        // const mRadius = rad * Math.cos(deg/180 * Math.PI);
        const mRadius = map(deg, 0, 90, rad, 0);
        ellipse(0, 0, 2 * mRadius, 2 * mRadius);
      }
      pop();
    }

    function azel2xy(az, el, rad) {
      // const r = rad * Math.cos(el / 180 * Math.PI);
      const r = map(el, 0, 90, rad, 0);
      const theta = az - 90;
      const x = r * cos(theta);
      const y = r * sin(theta);
      return { x, y };
    };

    function draw() {
      background(255);
      push();
      translate(width/2, height/2);
      const maxR = min(width/2, height/2);

      drawElevationRings(maxR);

      const visibleSun = getVisiblePasses(2026, 3, LOCATION, ultimate.solarAzimuthElevation, SUN_OPT);
      visibleSun.forEach(p => {
        p.path.forEach(({ azimuth, elevation }) => {
          const { x, y } = azel2xy(azimuth, elevation, maxR);
          fill(0);
          ellipse(x, y, 8, 8);
        })
      });

      const visibleMoon = getVisiblePasses(2026, 3, LOCATION, gpt.lunarAzimuthElevation, MOON_OPT);
      visibleMoon.forEach(p => {
        p.path.forEach(({ azimuth, elevation }) => {
          const { x, y } = azel2xy(azimuth, elevation, maxR);
          fill(0);
          ellipse(x, y, 4, 4);
        })
      });

      for (let gn = 16; gn < 20; gn += 1) {
        STA_OPT["tle"] = tles.sats[`goes${gn}`].tle;
        const visibleGoes = getVisiblePasses(2026, 3, LOCATION, satjs.satelliteAzimuthElevation, STA_OPT);
        visibleGoes.forEach(p => {
          p.path.forEach(({ azimuth, elevation }) => {
            const { x, y } = azel2xy(azimuth, elevation, maxR);
            fill(220,20,20);
            ellipse(x, y, 4, 4);
          })
        });
      }

      SAT_OPT["tle"] = tles.sats["nauka"].tle;
      const visibleAuka = getVisiblePasses(2026, 3, LOCATION, satjs.satelliteAzimuthElevation, SAT_OPT);

      // first Auka
      visibleAuka[0].path.forEach(({ azimuth, elevation }) => {
        const { x, y } = azel2xy(azimuth, elevation, maxR);
        fill(200,200,220);
        ellipse(x, y, 4, 4);
      });

      // TODO: find highest AUKA

      pop();
    }
  </script>

  <body>
    <main></main>
  </body>
</html>
