<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/2.0.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/satellite.js@6.0.2/dist/satellite.min.js"></script>
    <script src="../js/math.js"></script>
    <script src="../js/path.js"></script>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      canvas {
        display: block;
      }
    </style>
  </head>

  <script>
    const NYC = {
      lat: 40.731266,
      lon: -73.997060,
      tz: -4,
    };

    const FOR = {
      lat: -3.731862,
      lon: -38.526669,
      tz: -3,
    };

    const LOCATION = NYC;
    const MONTH = 3;
    const NDAYS = 12;

    const URLS = {
      GOES: "https://celestrak.org/NORAD/elements/gp.php?GROUP=goes&FORMAT=tle",
      NOAA: "https://celestrak.org/NORAD/elements/gp.php?GROUP=noaa&FORMAT=tle",
      STARLINK: "https://celestrak.org/NORAD/elements/gp.php?GROUP=starlink&FORMAT=tle",
      KUIPER: "https://celestrak.org/NORAD/elements/gp.php?GROUP=kuiper&FORMAT=tle",
      ISSS: "https://celestrak.org/NORAD/elements/gp.php?GROUP=stations&FORMAT=tle",
    };

    const SUN_OPT = {
      numDays: NDAYS,
      dayStep: 7,
      secondStep: 60,
    };

    const MOON_OPT = {
      numDays: NDAYS,
      dayStep: 1,
      secondStep: 60,
    };

    const SAT_OPT = {
      numDays: NDAYS,
      dayStep: 1,
      secondStep: 4,
    };

    const STA_OPT = {
      numDays: NDAYS,
      dayStep: 1,
      secondStep: 6*60*60,
    };

    const tles = {};
    const TLES = {};

    async function setup() {
      createCanvas(windowWidth, windowHeight);
      angleMode(DEGREES);
      noLoop();
      noStroke();
      const tleRes = await fetch("../data/tles.json");
      const tleJson = await tleRes.json();
      Object.assign(tles, tleJson.toSorted((a, b) => b.date.localeCompare(a.date))[0]);

      TLES.GOES = await getTlesFromUrl(URLS.GOES);
      TLES.NOAA = await getTlesFromUrl(URLS.NOAA);
      TLES.STARLINK = await getTlesFromUrl(URLS.STARLINK);
      TLES.KUIPER = await getTlesFromUrl(URLS.KUIPER);
    }

    function drawElevationRings(rad) {
      push();
      stroke(0, 255);
      ellipse(0, 0, 2 * rad, 2 * rad);

      stroke(0, 64);
      for (let deg = 15; deg < 90; deg += 15) {
        // const mRadius = rad * Math.cos(deg/180 * Math.PI);
        const mRadius = map(deg, 0, 90, rad, 0);
        ellipse(0, 0, 2 * mRadius, 2 * mRadius);
      }

      for (let deg = 0; deg < 360; deg += 15) {
        line(rad-10, 0, rad+10, 0);
        rotate(15);
      }

      pop();
    }

    function azel2xy(az, el, rad) {
      // const r = rad * Math.cos(el / 180 * Math.PI);
      const r = map(el, 0, 90, rad, 0);
      const theta = az - 90;
      const x = r * cos(theta);
      const y = r * sin(theta);
      return { x, y };
    };

    function drawPath(path, diam, rad) {
      path.path.forEach(({ azimuth, elevation }) => {
        const { x, y } = azel2xy(azimuth, elevation, rad);
        ellipse(x, y, diam);
      });
    }

    function draw() {
      background(255);
      push();
      translate(width/2, height/2);
      const maxR = min(width/2, height/2);

      drawElevationRings(maxR);

      console.log("SUN");
      const visibleSun = getVisiblePaths(2026, MONTH, LOCATION, ultimate.solarAzimuthElevation, SUN_OPT);
      visibleSun.forEach(p => {
        fill(0);
        drawPath(p, 8, maxR);
      });

      console.log("MOON");
      const visibleMoon = getVisiblePaths(2026, MONTH, LOCATION, gpt.lunarAzimuthElevation, MOON_OPT);
      visibleMoon.forEach(p => {
        fill(0);
        drawPath(p, 4, maxR);
      });

      TLES.GOES.forEach(s => {
        STA_OPT["tle"] = s.tle;
        console.log(s.name);
        const visibleGoes = getStationaryPaths(2026, MONTH, LOCATION, satjs.satelliteAzimuthElevation, STA_OPT);
        visibleGoes.forEach(p => {
          fill(220, 20, 20, 100);
          drawPath(p, 4, maxR);
        });
      });

      TLES.NOAA.forEach(s => {
        SAT_OPT["tle"] = s.tle;
        console.log(s.name);
        const visible = getVisiblePaths(2026, MONTH, LOCATION, satjs.satelliteAzimuthElevation, SAT_OPT);
        const highest = getHighestPath(visible);
        fill(120, 120, 220);
        drawPath(highest, 4, maxR);
      });

      // TODO: plot highest of the ones that come by the most
      TLES.STARLINK.slice(0, 32).forEach(s => {
        SAT_OPT["tle"] = s.tle;
        console.log(s.name);
        const visible = getVisiblePaths(2026, MONTH, LOCATION, satjs.satelliteAzimuthElevation, SAT_OPT);
        const highest = getHighestPath(visible);
        fill(200,200,220);
        drawPath(highest, 4, maxR);
      });

      // TODO: plot highest of the ones that come by the most
      TLES.KUIPER.slice(0, 32).forEach(s => {
        SAT_OPT["tle"] = s.tle;
        console.log(s.name);
        const visible = getVisiblePaths(2026, MONTH, LOCATION, satjs.satelliteAzimuthElevation, SAT_OPT);
        const highest = getHighestPath(visible);
        fill(200,200,220);
        drawPath(highest, 4, maxR);
      });

      // space stations and special flights
      ["nauka", "hubble", "crew12", "soyuz"].forEach(sat => {
        SAT_OPT["tle"] = tles.sats[sat].tle;
        console.log(tles.sats[sat].name);
        const visible = getVisiblePaths(2026, MONTH, LOCATION, satjs.satelliteAzimuthElevation, SAT_OPT);
        const highest = getHighestPath(visible);
        fill(120, 220, 120);
        drawPath(highest, 4, maxR);
      });

      pop();
    }
  </script>

  <body>
    <main></main>
  </body>
</html>
