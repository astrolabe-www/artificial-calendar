<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/2.0.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/satellite.js@6.0.2/dist/satellite.min.js"></script>
    <script src="../js/math.js"></script>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      canvas {
        display: block;
      }
    </style>
  </head>

  <script>
    const NY = {
      lat: 40.731266,
      lon: -73.997060,
      tz: -4,
    };

    const ISS = [
      "1 49044U 21066A   26068.44878279  .00007802  00000+0  15192-3 0  9994",
      "2 49044  51.6321  73.5472 0008027 173.5451 186.5642 15.48542052556062"
    ];

    const GOES16 = [
      "1 41866U 16071A   26068.48460699 -.00000089  00000+0  00000+0 0  9994",
      "2 41866   0.1348  88.3659 0002252 227.2519 281.3020  1.00272349 34103"
    ];

    const GOES19 = [
      "1 60133U 24119A   26068.49050036 -.00000247  00000+0  00000+0 0  9991",
      "2 60133   0.0421 326.5488 0001046  69.1609 232.8440  1.00273294  5961"
    ];

    const localTime = { hour: 0, minute: 0, second: 0};
    const localDate = { year: 2026, month: 3, day: 1 };

    function setup() {
      createCanvas(windowWidth, windowHeight);
      angleMode(DEGREES);
      noLoop();
    }

    function draw() {
      background(255);
      push();
      translate(width/2, height/2);
      const maxR = min(width/2, height/2);

      const azel2xy = (az, el) => {
        const r = map(el, 0, 90, maxR, 0);
        const theta = az - 90;
        const x = r * cos(theta);
        const y = r * sin(theta);
        return { x, y };
      };

      ellipse(0, 0, 2 * maxR, 2 * maxR);

      for (let day = 1; day < 31; day += 6) {
        localDate.day = day;

        noStroke();
        for (let dayMinute = 0; dayMinute < 1440; dayMinute += 30) {
          localTime.hour = Math.floor(dayMinute / 60);
          localTime.minute = parseInt(dayMinute % 60);

          let { azimuth, elevation } = hygor.solarAzimuthElevation(localDate, localTime, NY.lat, NY.lon, NY.tz);
          if (elevation >= 0 && false) {
            const { x, y } = azel2xy(azimuth, elevation);
            fill(250, 200, 20, map(elevation, 0, 90, 20, 255));
            ellipse(x,y,14,14);
          }

          ({ azimuth, elevation } = omni.solarAzimuthElevation(localDate, localTime, NY.lat, NY.lon, NY.tz));
          if (elevation >= 0 && false) {
            const { x, y } = azel2xy(azimuth, elevation);
            fill(250, 128, 20, map(elevation, 0, 90, 20, 255));
            ellipse(x, y, 4, 4);
          }

          ({ azimuth, elevation } = ultimate.solarAzimuthElevation(localDate, localTime, NY.lat, NY.lon, NY.tz));
          if (elevation >= 0) {
            const { x, y } = azel2xy(azimuth, elevation);
            fill(250, 128, 20, map(elevation, 0, 90, 20, 255));
            ellipse(x, y, 8, 8);
          }

          ({ azimuth, elevation } = gpt.lunarAzimuthElevation(localDate, localTime, NY.lat, NY.lon, NY.tz));
          if (elevation >= 0) {
            const { x, y } = azel2xy(azimuth, elevation);
            fill(128, 128, 150, map(elevation, 0, 90, 20, 255));
            ellipse(x, y, 4, 4);
          }

          ({ azimuth, elevation } = satjs.satelliteAzimuthElevation(localDate, localTime, NY.lat, NY.lon, NY.tz, GOES16));
          if (elevation >= 0 || true) {
            const { x, y } = azel2xy(azimuth, elevation);
            fill(250, 50, 150, map(elevation, 0, 90, 20, 255));
            ellipse(x, y, 4, 4);
          }

          ({ azimuth, elevation } = satjs.satelliteAzimuthElevation(localDate, localTime, NY.lat, NY.lon, NY.tz, GOES19));
          if (elevation >= 0 || true) {
            const { x, y } = azel2xy(azimuth, elevation);
            fill(150, 50, 250, map(elevation, 0, 90, 20, 255));
            ellipse(x, y, 4, 4);
          }
        }
      }

      pop();
    }
  </script>

  <body>
    <main></main>
  </body>
</html>
