<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/2.0.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/satellite.js@6.0.2/dist/satellite.min.js"></script>
    <script src="../js/math.js"></script>
    <script src="../js/path.js"></script>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      canvas {
        display: block;
      }
    </style>
  </head>

  <script>
    const NYC = {
      lat: 40.731266,
      lon: -73.997060,
      tz: -4,
    };

    const FOR = {
      lat: -3.731862,
      lon: -38.526669,
      tz: -3,
    };

    const LOCATION = NYC;
    const MONTH = 3;
    const NDAYS = 21;

    const DATADATE = "20260313";

    const SUN_OPT = {
      numDays: NDAYS,
      dayStep: 7,
      secondStep: 2*60,
    };

    const MOON_OPT = {
      numDays: NDAYS,
      dayStep: 1,
      secondStep: 2*60,
    };

    const SAT_OPT = {
      numDays: NDAYS,
      dayStep: 1,
      secondStep: 4,
    };

    const STA_OPT = {
      numDays: NDAYS,
      dayStep: 1,
      secondStep: 6*60*60,
    };

    const TLES = {};
    const SSS = ["ISS (NAUKA)", "CREW DRAGON 12", "SOYUZ-MS 28", "CSS (TIANHE)"];
    const SCI = ["FGRST (GLAST)", "HST", "TERRA", "CXO", "POLAR"];

    async function fetchTles() {
      const satGroups = ["goes", "noaa", "starlink", "kuiper", "sss", "sci"];

      // { k: f"../data/etc/{k}.txt" for k in satGroups }
      const URLS = satGroups.reduce((acc, k) => ({ ...acc, [k]: `../data/tles/${k}.txt` }), {});

      const ps = satGroups.map(k => getTlesFromUrl(URLS[k]));
      const data = await Promise.all(ps);

      return satGroups.reduce((acc, k, idx) => ({ ...acc, [k]: data[idx] }), {});
    }

    async function setup() {
      createCanvas(windowWidth, windowHeight);
      angleMode(DEGREES);
      noLoop();
      noStroke();

      Object.assign(TLES, await fetchTles());
    }

    function drawElevationRings(rad) {
      push();
      stroke(0, 255);
      ellipse(0, 0, 2 * rad, 2 * rad);

      stroke(0, 64);
      for (let deg = 15; deg < 90; deg += 15) {
        // const mRadius = rad * Math.cos(deg/180 * Math.PI);
        const mRadius = map(deg, 0, 90, rad, 0);
        ellipse(0, 0, 2 * mRadius, 2 * mRadius);
      }

      for (let deg = 0; deg < 360; deg += 15) {
        line(rad-10, 0, rad+10, 0);
        rotate(15);
      }

      pop();
    }

    function azel2xy(az, el, rad) {
      // const r = rad * Math.cos(el / 180 * Math.PI);
      const r = map(el, 0, 90, rad, 0);
      const theta = az - 90;
      const x = r * cos(theta);
      const y = r * sin(theta);
      return { x, y };
    };

    function drawPath(path, diam, c, rad) {
      push();
      noFill();
      stroke(c);
      strokeWeight(diam);
      beginShape();
      path.path.forEach(({ azimuth, elevation }) => {
        const { x, y } = azel2xy(azimuth, elevation, rad);
        vertex(x, y);
      });
      endShape();
      pop();
    }

    function draw() {
      background(255);
      push();
      translate(width/2, height/2);
      const maxR = min(width/2, height/2);
      const dotDim = 2;

      drawElevationRings(maxR);

      console.log("SUN");
      const visibleSun = getVisiblePaths(2026, MONTH, LOCATION, ultimate.solarAzimuthElevation, SUN_OPT);
      visibleSun.forEach(p => {
        drawPath(p, 8, color(220, 120, 0, 100), maxR);
      });

      console.log("MOON");
      const visibleMoon = getVisiblePaths(2026, MONTH, LOCATION, gpt.lunarAzimuthElevation, MOON_OPT);
      for (let idx = 0; idx < visibleMoon.length; idx += 4) {
        drawPath(visibleMoon[idx], 4, color(0,0,0, 100), maxR);
      }

      TLES.goes.forEach(s => {
        STA_OPT["tle"] = s.tle;
        console.log(s.name);
        const visibleGoes = getStationaryPaths(2026, MONTH, LOCATION, satjs.satelliteAzimuthElevation, STA_OPT);
        visibleGoes.forEach(p => {
          drawPath(p, dotDim, color(220, 20, 20), maxR);
        });
      });

      const noaaMostVisited = getMostVisitedHighestLowestPaths(TLES.noaa, SAT_OPT);
      console.log(noaaMostVisited.name);
      drawPath(noaaMostVisited.highestPath, dotDim, color(18, 18, 220), maxR);

      const starlinkMostVisited = getMostVisitedHighestLowestPaths(TLES.starlink.slice(0, 32), SAT_OPT);
      console.log(starlinkMostVisited.name);
      drawPath(starlinkMostVisited.highestPath, dotDim, color(200, 18, 22), maxR);

      const kuiperMostVisited = getMostVisitedHighestLowestPaths(TLES.kuiper.slice(0, 32), SAT_OPT);
      console.log(kuiperMostVisited.name);
      drawPath(kuiperMostVisited.highestPath, dotDim, color(20, 180, 22), maxR);

      const sssTles = TLES.sss.filter(s => SSS.includes(s.name));
      const sssMostVisited = getMostVisitedHighestLowestPaths(sssTles, SAT_OPT);
      console.log(sssMostVisited.name);
      drawPath(sssMostVisited.highestPath, dotDim, color(220, 10, 220), maxR);

      SCI.forEach(name => {
        const s = TLES.sci.filter(s => s.name == name)[0];
        SAT_OPT["tle"] = s.tle;
        console.log(s.name);
        const visible = getVisiblePaths(2026, MONTH, LOCATION, satjs.satelliteAzimuthElevation, SAT_OPT);
        const [highest, lowest] = getHighestLowestPaths(visible);
        drawPath(highest, dotDim, color(180, 180, 220), maxR);
      });

      pop();
    }
  </script>

  <body>
    <main></main>
  </body>
</html>
